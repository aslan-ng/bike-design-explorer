name: Deploy HF Space

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v6

      - name: Prepare Space files
        run: |
          rm -rf hf_space
          mkdir -p hf_space

          cat requirements/base.txt > hf_space/requirements.txt
          echo "" >> hf_space/requirements.txt
          grep -v "^-r " requirements/production.txt >> hf_space/requirements.txt || true

          cp app.py hf_space/
          cp config.py hf_space/
          cp demand.py hf_space/
          cp design.py hf_space/
          cp load_hf.py hf_space/
          cp model.py hf_space/
          cp ui.py hf_space/
          cp data/user_needs.csv hf_space/

          cat > hf_space/README.md << 'EOF'
          ---
          title: Bike Design Explorer
          emoji: 🏆
          colorFrom: indigo
          colorTo: blue
          sdk: gradio
          sdk_version: "6.19.0"
          python_version: "3.12"
          app_file: app.py
          pinned: true
          license: mit
          short_description: Educational bike design optimization tool
          ---
          EOF

      - name: Check HF token exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN GitHub secret is missing or empty."
            exit 1
          fi

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U huggingface_hub

          hf upload \
            aslan-ng/bike-design-explorer \
            hf_space \
            . \
            --repo-type space \
            --token "$HF_TOKEN"